# Arduino Tools - Continuous Integration
# 持续集成测试工作流
# 触发: push / pull_request 到 main 或 develop 分支
# 说明: arduino-mcp-server 仅在有 pyproject.toml 时运行；arduino-client 始终运行安装与冒烟测试

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test-arduino-client:
    name: Arduino Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arduino-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-client-${{ hashFiles('arduino-client/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-client-

      - name: Install arduino-client
        run: pip install -e ".[dev]"

      - name: Smoke test
        run: |
          python -c "import arduino_client; print(arduino_client.__version__)"
          python -m arduino_client --version || true

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests directory, skip pytest"
          fi

      - name: Summary
        if: always()
        run: echo "## Arduino Client" >> $GITHUB_STEP_SUMMARY && echo "- install + smoke: done" >> $GITHUB_STEP_SUMMARY

  test-arduino-mcp-server:
    name: Arduino MCP Server
    runs-on: ubuntu-latest
    if: hashFiles('arduino-mcp-server/pyproject.toml') != ''
    defaults:
      run:
        working-directory: arduino-mcp-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('arduino-mcp-server/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          ARDUINO_BIN="${{ github.workspace }}/arduino-mcp-server/bin"
          echo "$ARDUINO_BIN" >> $GITHUB_PATH
          echo "$HOME/bin" >> $GITHUB_PATH
          export PATH="$ARDUINO_BIN:$HOME/bin:$PATH"
          arduino-cli version

      - name: Install Arduino cores
        run: |
          arduino-cli config init 2>/dev/null || true
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli core install arduino:mbed_rp2040

      - name: Install project dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            python -m pytest tests/ -v --tb=short || echo "No tests found"
          else
            echo "No tests directory found, skipping tests"
          fi

      - name: Test summary
        if: always()
        run: echo "## Arduino MCP Server" >> $GITHUB_STEP_SUMMARY && echo "- Tests: completed" >> $GITHUB_STEP_SUMMARY
