[pytest]
# Pytest configuration for Arduino MCP Server CI
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: Unit tests, no external dependencies (arduino-cli, serial ports)
    integration: Integration tests, require arduino-cli installed
    hardware: Hardware tests, require physical Arduino board (skipped in CI)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
